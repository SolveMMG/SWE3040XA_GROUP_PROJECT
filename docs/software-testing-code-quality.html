<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Software Testing and Code Quality</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #18212f;
        --muted: #5e6b7c;
        --line: #d8dee8;
        --paper: #f7f8fb;
        --panel: #ffffff;
        --green: #117b63;
        --blue: #2856a3;
        --red: #b0413e;
        --gold: #a86d0d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          linear-gradient(135deg, rgba(40, 86, 163, 0.08), transparent 32%),
          linear-gradient(315deg, rgba(17, 123, 99, 0.08), transparent 34%),
          var(--paper);
      }

      main {
        width: min(1040px, calc(100vw - 48px));
        min-height: 620px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 18px 48px rgba(24, 33, 47, 0.14);
        padding: 46px;
      }

      .eyebrow {
        margin: 0 0 10px;
        font-size: 14px;
        font-weight: 750;
        color: var(--blue);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      h1 {
        margin: 0;
        font-size: 44px;
        line-height: 1.05;
        letter-spacing: 0;
      }

      .description {
        max-width: 760px;
        margin: 18px 0 30px;
        color: var(--muted);
        font-size: 20px;
        line-height: 1.5;
      }

      .visual {
        display: grid;
        gap: 18px;
        margin-top: 24px;
      }

      .levels {
        grid-template-columns: repeat(4, 1fr);
      }

      .card {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 18px;
        min-height: 150px;
        background: #fbfcfe;
      }

      .card strong {
        display: block;
        margin-bottom: 10px;
        font-size: 18px;
      }

      .card span {
        color: var(--muted);
        font-size: 15px;
        line-height: 1.4;
      }

      .pipeline {
        grid-template-columns: repeat(5, 1fr);
        align-items: stretch;
      }

      .step {
        border-left: 5px solid var(--green);
        background: #f3faf7;
      }

      .review {
        grid-template-columns: 1fr 1fr;
      }

      .checklist {
        display: grid;
        gap: 12px;
      }

      .check {
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--ink);
      }

      .box {
        width: 20px;
        height: 20px;
        border-radius: 4px;
        border: 2px solid var(--green);
        display: grid;
        place-items: center;
        color: var(--green);
        font-weight: 900;
      }

      pre {
        margin: 0;
        overflow: hidden;
        border-radius: 8px;
        padding: 20px;
        background: #111827;
        color: #d6e2ff;
        font-size: 17px;
        line-height: 1.5;
      }

      .code-key {
        color: #8bd5ca;
      }

      .code-warn {
        color: #ffd27d;
      }

      .cycle {
        grid-template-columns: repeat(3, 1fr);
      }

      .cycle .card {
        min-height: 190px;
      }

      .fail {
        border-top: 5px solid var(--red);
      }

      .pass {
        border-top: 5px solid var(--green);
      }

      .refactor {
        border-top: 5px solid var(--gold);
      }

      .caption {
        margin-top: 26px;
        padding-top: 18px;
        border-top: 1px solid var(--line);
        color: var(--muted);
        font-size: 15px;
      }
    </style>
  </head>
  <body>
    <main id="slide"></main>

    <script>
      const slides = {
        testingLevels: {
          eyebrow: 'Testing levels',
          title: 'Unit, Integration, System, and Acceptance Testing',
          description:
            'Testing is done in layers: small code pieces first, then connected parts, then the full system, and finally the user requirements.',
          visual: `
            <div class="visual levels">
              <div class="card"><strong>Unit</strong><span>Checks one function, component, or module in isolation.</span></div>
              <div class="card"><strong>Integration</strong><span>Checks that modules work together, such as API plus database.</span></div>
              <div class="card"><strong>System</strong><span>Checks the complete application from end to end.</span></div>
              <div class="card"><strong>Acceptance</strong><span>Checks whether the software satisfies user requirements.</span></div>
            </div>
          `,
          caption: 'Example: test a login validator, then login API, then full login flow, then requirement approval.',
        },
        automation: {
          eyebrow: 'Test automation',
          title: 'Automated Tests Run the Same Checks Repeatedly',
          description:
            'Automation lets the team run tests quickly after changes, reducing manual effort and catching regressions early.',
          visual: `
            <div class="visual pipeline">
              <div class="card step"><strong>1. Code</strong><span>Developer pushes a change.</span></div>
              <div class="card step"><strong>2. Build</strong><span>The app is compiled or bundled.</span></div>
              <div class="card step"><strong>3. Test</strong><span>Unit and backend tests run automatically.</span></div>
              <div class="card step"><strong>4. Report</strong><span>Failures are shown immediately.</span></div>
              <div class="card step"><strong>5. Fix</strong><span>The team corrects problems before release.</span></div>
            </div>
          `,
          caption: 'In this project, npm test and backend quality scripts are examples of test automation.',
        },
        codeReviews: {
          eyebrow: 'Code reviews',
          title: 'Code Reviews Improve Quality Before Merging',
          description:
            'A code review is when another developer checks a change for correctness, readability, security, and missing tests.',
          visual: `
            <div class="visual review">
              <div class="card">
                <strong>Review checklist</strong>
                <div class="checklist">
                  <div class="check"><span class="box">✓</span><span>Clear names and readable logic</span></div>
                  <div class="check"><span class="box">✓</span><span>No obvious bugs or broken flows</span></div>
                  <div class="check"><span class="box">✓</span><span>Errors and edge cases handled</span></div>
                  <div class="check"><span class="box">✓</span><span>Tests updated where needed</span></div>
                </div>
              </div>
              <pre><span class="code-key">Reviewer:</span> Looks good overall.
<span class="code-warn">Suggestion:</span> Add a test for invalid login.

<span class="code-key">Developer:</span> Added the test and reran checks.</pre>
            </div>
          `,
          caption: 'Reviews help catch issues that automated tools may miss.',
        },
        staticAnalysis: {
          eyebrow: 'Static code analysis',
          title: 'Static Analysis Finds Problems Without Running the App',
          description:
            'Static analysis tools scan source code for style issues, unsafe patterns, unused variables, and possible bugs.',
          visual: `
            <div class="visual review">
              <pre><span class="code-key">npm run lint</span>

src/controllers/auth.controller.js
  12:7  warning  Unexpected console statement
  28:5  error    Missing semicolon

<span class="code-warn">Result:</span> Fix issues before merging.</pre>
              <div class="card">
                <strong>Common tools</strong>
                <div class="checklist">
                  <div class="check"><span class="box">✓</span><span>ESLint for JavaScript</span></div>
                  <div class="check"><span class="box">✓</span><span>Prettier for formatting</span></div>
                  <div class="check"><span class="box">✓</span><span>SonarQube for deeper quality scans</span></div>
                </div>
              </div>
            </div>
          `,
          caption: 'The backend already includes an ESLint quality check.',
        },
        tdd: {
          eyebrow: 'Test-driven development',
          title: 'TDD Means Tests Guide the Implementation',
          description:
            'In TDD, developers write a failing test first, add the simplest code that passes it, then clean up the code.',
          visual: `
            <div class="visual cycle">
              <div class="card fail"><strong>Red</strong><span>Write a test for the expected behavior. It fails because the feature does not exist yet.</span></div>
              <div class="card pass"><strong>Green</strong><span>Write the smallest amount of code needed to make the test pass.</span></div>
              <div class="card refactor"><strong>Refactor</strong><span>Improve the design while keeping all tests passing.</span></div>
            </div>
          `,
          caption: 'TDD is useful for business rules, validation, calculations, and bug fixes.',
        },
      };

      const params = new URLSearchParams(window.location.search);
      const key = params.get('slide') || 'testingLevels';
      const slide = slides[key] || slides.testingLevels;

      document.getElementById('slide').innerHTML = `
        <p class="eyebrow">${slide.eyebrow}</p>
        <h1>${slide.title}</h1>
        <p class="description">${slide.description}</p>
        ${slide.visual}
        <p class="caption">${slide.caption}</p>
      `;
    </script>
  </body>
</html>
