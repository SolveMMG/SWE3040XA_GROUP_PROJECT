version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rideconnect-backend
    ports:
      - '5000:5000'
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/rideconnect
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-changeme}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - rideconnect-net
    restart: unless-stopped

  frontend-web:
    build:
      context: ./frontend-web
      dockerfile: Dockerfile
    container_name: rideconnect-web
    ports:
      - '3000:80'
    depends_on:
      - backend
    networks:
      - rideconnect-net
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: rideconnect-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rideconnect
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rideconnect-net

  redis:
    image: redis:7-alpine
    container_name: rideconnect-redis
    ports:
      - '6379:6379'
    networks:
      - rideconnect-net

volumes:
  postgres-data:

networks:
  rideconnect-net:
    driver: bridge
